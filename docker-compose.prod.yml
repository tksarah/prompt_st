services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      PORT: 3000
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:?Set ALLOWED_ORIGIN to https://your-domain}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      ENABLE_MODEL_SWITCH: ${ENABLE_MODEL_SWITCH:-false}
      ALLOWED_MODELS: ${ALLOWED_MODELS:-gpt-4o-mini}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-false}
      CHAT_HISTORY_TTL_MINUTES: ${CHAT_HISTORY_TTL_MINUTES:-30}
      SESSION_HISTORY_VISIBLE_COUNT: ${SESSION_HISTORY_VISIBLE_COUNT:-10}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN to your production domain}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
